<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnostic Submissions | Zero Chaos Leadership</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {margin:0;padding:0;box-sizing:border-box;}
    :root {--black:#0a0a08;--charcoal:#1c1c1a;--dark-mid:#2a2a27;--muted:#6b6b65;--faint:#9a9a92;--white:#f4f4ee;--amber:#c8832a;}
    body {font-family:'DM Mono',monospace;background:var(--black);color:var(--white);line-height:1.6;}
    .dashboard {max-width:1400px;margin:0 auto;padding:40px 20px;}
    .header {margin-bottom:40px;padding-bottom:20px;border-bottom:1px solid var(--dark-mid);}
    .header h1 {font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;text-transform:uppercase;}
    .stats {display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:30px;}
    .stat-card {background-color:var(--dark-mid);padding:20px;border-radius:4px;border-left:3px solid var(--amber);}
    .stat-label {font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
    .stat-number {font-size:28px;font-weight:bold;color:var(--amber);}
    .filters {display:flex;gap:12px;margin-bottom:30px;flex-wrap:wrap;}
    .filter-btn {padding:8px 16px;background-color:var(--dark-mid);border:1px solid var(--muted);border-radius:2px;color:var(--white);cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;text-transform:uppercase;}
    .filter-btn.active {background-color:var(--amber);color:var(--black);border-color:var(--amber);}
    .table-container {background-color:var(--dark-mid);border-radius:4px;overflow-x:auto;margin-top:20px;}
    table {width:100%;border-collapse:collapse;}
    th {background-color:var(--charcoal);padding:12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--faint);border-bottom:1px solid var(--muted);font-weight:600;}
    td {padding:12px;border-bottom:1px solid var(--charcoal);font-size:13px;}
    tr:hover {background-color:rgba(200,131,42,0.05);}
    .button {padding:8px 16px;background-color:var(--amber);color:var(--black);border:none;border-radius:2px;cursor:pointer;font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:600;font-family:'DM Mono',monospace;}
    .button:hover {opacity:0.9;}
    .modal {display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;}
    .modal.active {display:flex;}
    .modal-content {background-color:var(--dark-mid);padding:32px;border-radius:4px;max-width:500px;width:90%;}
    .modal h3 {margin-bottom:20px;color:var(--amber);}
    .form-group {margin-bottom:16px;}
    .form-group label {display:block;font-size:11px;text-transform:uppercase;color:var(--faint);margin-bottom:6px;}
    .form-group input,.form-group select {width:100%;padding:10px;background-color:var(--charcoal);border:1px solid var(--muted);border-radius:2px;color:var(--white);font-family:'DM Mono',monospace;font-size:12px;}
    .form-group input:focus,.form-group select:focus {outline:none;border-color:var(--amber);}
    .modal-buttons {display:flex;gap:12px;margin-top:24px;}
    .modal-buttons button {flex:1;}
    .modal-buttons .cancel {background-color:var(--charcoal);color:var(--white);}
    .loading {text-align:center;padding:40px;color:var(--faint);}
  </style>
</head>
<body>
<div class="dashboard">
  <div class="header"><h1>Diagnostic Submissions</h1></div>
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Total Submissions</div><div class="stat-number" id="totalCount">0</div></div>
    <div class="stat-card"><div class="stat-label">New Leads</div><div class="stat-number" id="newCount">0</div></div>
    <div class="stat-card"><div class="stat-label">Contacted</div><div class="stat-number" id="contactedCount">0</div></div>
    <div class="stat-card"><div class="stat-label">Scheduled</div><div class="stat-number" id="scheduledCount">0</div></div>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="filterByStatus('')">All</button>
    <button class="filter-btn" onclick="filterByStatus('new')">New</button>
    <button class="filter-btn" onclick="filterByStatus('contacted')">Contacted</button>
    <button class="filter-btn" onclick="filterByStatus('scheduled')">Scheduled</button>
  </div>
  <div id="loading" class="loading">Loading submissions...</div>
  <div id="tableContainer" class="table-container" style="display:none;">
    <table>
      <thead>
        <tr><th>Name</th><th>Email</th><th>Company</th><th>Category</th><th>Status</th><th>Created</th><th>Action</th></tr>
      </thead>
      <tbody id="submissionsTable"></tbody>
    </table>
  </div>
</div>
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3>Edit Submission</h3>
    <div class="form-group"><label>Name</label><input type="text" id="editName"></div>
    <div class="form-group"><label>Email</label><input type="email" id="editEmail"></div>
    <div class="form-group"><label>Company</label><input type="text" id="editCompany"></div>
    <div class="form-group"><label>Status</label><select id="editStatus"><option value="new">New</option><option value="contacted">Contacted</option><option value="scheduled">Scheduled</option><option value="engaged">Engaged</option></select></div>
    <div class="form-group"><label>Notes</label><input type="text" id="editNotes"></div>
    <div class="modal-buttons"><button class="button cancel" onclick="closeModal()">Cancel</button><button class="button" onclick="saveEdit()">Save</button></div>
  </div>
</div>
<script>
  const SUPABASE_URL='https://qebtjrryudnifxalznxw.supabase.co';
  const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlYnRqcnJ5dWRuaWZ4YWx6bnh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMDk0MTQsImV4cCI6MjA5NTU4NTQxNH0.wH-z4vqdejwhYNBPCeFaqRI_N5zZ5u6MNL0CNw1TTb4';
  let supabase=null,allSubmissions=[],currentFilter='',currentEditId=null;
  function initSupabase(){if(!supabase){const {createClient}=window.supabase;supabase=createClient(SUPABASE_URL,SUPABASE_KEY);}return supabase;}
  async function loadSubmissions(){try{const client=initSupabase();const {data,error}=await client.from('diagnostic_submissions').select('*').order('created_at',{ascending:false});if(error)throw error;allSubmissions=data||[];updateStats();render();document.getElementById('loading').style.display='none';document.getElementById('tableContainer').style.display='block';}catch(err){document.getElementById('loading').innerHTML=`<strong>Error:</strong> ${err.message}`;}}
  function updateStats(){const total=allSubmissions.length;const newCount=allSubmissions.filter(s=>s.status==='new').length;const contacted=allSubmissions.filter(s=>s.status==='contacted').length;const scheduled=allSubmissions.filter(s=>s.status==='scheduled').length;document.getElementById('totalCount').textContent=total;document.getElementById('newCount').textContent=newCount;document.getElementById('contactedCount').textContent=contacted;document.getElementById('scheduledCount').textContent=scheduled;}
  function filterByStatus(status){currentFilter=status;document.querySelectorAll('.filter-btn').forEach(btn=>btn.classList.remove('active'));event.target.classList.add('active');render();}
  function render(){const filtered=currentFilter?allSubmissions.filter(s=>s.status===currentFilter):allSubmissions;const rows=filtered.map(s=>`<tr><td>${s.name||'—'}</td><td>${s.email}</td><td>${s.company||'—'}</td><td>${s.category||'—'}</td><td>${s.status}</td><td>${new Date(s.created_at).toLocaleDateString()}</td><td><button class="button" onclick="openEdit('${s.id}','${s.name||''}','${s.email}','${s.company||''}','${s.status}','${s.notes||''}')">Edit</button></td></tr>`).join('');document.getElementById('submissionsTable').innerHTML=rows;}
  function openEdit(id,name,email,company,status,notes){currentEditId=id;document.getElementById('editName').value=name;document.getElementById('editEmail').value=email;document.getElementById('editCompany').value=company;document.getElementById('editStatus').value=status;document.getElementById('editNotes').value=notes;document.getElementById('editModal').classList.add('active');}
  function closeModal(){document.getElementById('editModal').classList.remove('active');}
  async function saveEdit(){try{const client=initSupabase();const {error}=await client.from('diagnostic_submissions').update({name:document.getElementById('editName').value,company:document.getElementById('editCompany').value,status:document.getElementById('editStatus').value,notes:document.getElementById('editNotes').value,last_updated:new Date().toISOString()}).eq('id',currentEditId);if(error)throw error;closeModal();loadSubmissions();}catch(err){alert('Error: '+err.message);}}
  window.addEventListener('load',loadSubmissions);
</script>
</body>
</html>
